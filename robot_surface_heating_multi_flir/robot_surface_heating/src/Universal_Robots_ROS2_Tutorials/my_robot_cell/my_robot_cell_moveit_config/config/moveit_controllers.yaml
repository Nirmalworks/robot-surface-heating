# MoveIt uses this configuration for controller management

moveit_controller_manager: moveit_simple_controller_manager/MoveItSimpleControllerManager

moveit_simple_controller_manager:
  controller_names:
    - ur5_controller
    - ur_ten_controller

  ur5_controller:
    type: FollowJointTrajectory
    action_ns: follow_joint_trajectory
    default: true
    joints:
      - ur5__shoulder_pan_joint
      - ur5__shoulder_lift_joint
      - ur5__elbow_joint
      - ur5__wrist_1_joint
      - ur5__wrist_2_joint
      - ur5__wrist_3_joint
    action_ns: follow_joint_trajectory
    default: true
  ur_ten_controller:
    type: FollowJointTrajectory
    action_ns: follow_joint_trajectory
    default: true
    joints:
      - ur10e_shoulder_pan_joint
      - ur10e_shoulder_lift_joint
      - ur10e_elbow_joint
      - ur10e_wrist_1_joint
      - ur10e_wrist_2_joint
      - ur10e_wrist_3_joint
    action_ns: follow_joint_trajectory
    default: true